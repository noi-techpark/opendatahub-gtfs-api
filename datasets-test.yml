datasets:
  skyalps-flight-data:
    # The backend URL the data is downloaded from
    source: https://flighdata-skyalps-gtfs-test.s3.eu-west-1.amazonaws.com/ssim-gtfs.zip
    # time to live of GTFS file cache. 
    cache_ttl: 300
    description: Planned flights of the operator SkyAlps
    origin: skyalps.it
    license: CC0
    metadata: 
      modes:
        - flight
  sta-time-tables:
    source: ftp://anonymous:guest@ftp.sta.bz.it/gtfs/google_transit_shp.zip
    cache_ttl: 7200
    description: Public transportation data provided by STA
    origin: sta.bz.it
    license: CC0
    metadata:
      modes:
        - bus
        - train
        - cable car
    realtime:
      cache_ttl: 0
      feeds:
        trip_updates:
          sources:
            json: https://files.dev.testingmachine.eu/gtfs-rt/feeds/sta/trip-updates.json
            pb: https://files.dev.testingmachine.eu/gtfs-rt/feeds/sta/trip-updates.pb
        vehicle_positions:
          sources:
            json: https://files.dev.testingmachine.eu/gtfs-rt/feeds/sta/vehicle-positions.json
            pb: https://files.dev.testingmachine.eu/gtfs-rt/feeds/sta/vehicle-positions.pb
        service_alerts:
          sources:
            json: https://files.dev.testingmachine.eu/gtfs-rt/feeds/sta/service-alerts.json
            pb: https://files.dev.testingmachine.eu/gtfs-rt/feeds/sta/service-alerts.pb
